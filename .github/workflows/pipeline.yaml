on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - tag: red
            theme: red
          - tag: green
            theme: green
          - tag: blue
            theme: blue

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push (${{ matrix.tag }})
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: APP_THEME=${{ matrix.theme }}
          tags: leobgs/leocinema-frontend:${{ matrix.tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Clone ArgoCD Repository
        run: git clone https://github.com/leonardobgsilva/app-leocinema-kubernetes.git

      - name: Update values.yaml
        run: sed -i 's/leocinema-frontend:.*/leocinema-frontend:red/' app-leocinema-kubernetes/helm/leocinema/values.yaml

      - name: Commit and Push
        run: |
          cd app-leocinema-kubernetes
          git config --local user.email "ghactions@frontend.com"
          git config --local user.name "Frontend GitHub Actions"
          git add helm/leocinema/values.yaml
          git commit -m "ci: atualização automática da imagem frontend"
          git push https://${{ secrets.GH_TOKEN }}@github.com/leonardobgsilva/app-leocinema-kubernetes.git
